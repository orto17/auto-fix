name: JFrog Auto-Fix
description: Automatically creates a fix PR for a vulnerable dependency identified by JFrog

inputs:
  version:
    description: 'JFrog Auto-Fix version to download. Defaults to the latest release.'
    required: false
    default: '[RELEASE]'
  component_name:
    description: 'Dependency to fix. Maven format: "groupId:artifactId". NPM format: "packageName".'
    required: true
  affected_version:
    description: 'Currently installed vulnerable version'
    required: true
  fix_version:
    description: 'Version to upgrade to'
    required: true
  github_token:
    description: 'GitHub token with write access to the target repository'
    required: true
  base_branch:
    description: 'Branch to open the PR against'
    required: false
    default: 'main'
  log_level:
    description: 'Log verbosity level: DEBUG, INFO, WARN, ERROR'
    required: false
    default: 'INFO'

outputs:
  pr_url:
    description: 'URL of the created pull request'

runs:
  using: composite
  steps:
    - name: Download JFrog Auto-Fix
      shell: bash
      run: |
        bash ${{ github.action_path }}/getAutoFix.sh ${{ inputs.version }}

    - name: Run JFrog Auto-Fix
      shell: bash
      env:
        INPUT_COMPONENT_NAME: ${{ inputs.component_name }}
        INPUT_AFFECTED_VERSION: ${{ inputs.affected_version }}
        INPUT_FIX_VERSION: ${{ inputs.fix_version }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_BASE_BRANCH: ${{ inputs.base_branch }}
        INPUT_LOG_LEVEL: ${{ inputs.log_level }}
      run: ./jfrog-auto-fix
